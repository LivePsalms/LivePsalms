      - generic [ref=e76]:
        - img "Courtyard doorway" [ref=e79]
        - heading "Peace" [level=2] [ref=e80]:
          - generic [ref=e82]: Peace
        - generic [ref=e85]: Let’s take a moment and let God restore the peace in and around you.
      - generic [ref=e86]:
        - heading "When was the last time you truly felt at rest?" [level=3] [ref=e87]:
          - generic [ref=e89]: When was the last time you truly felt at rest?
        - generic [ref=e92]: Not just asleep, but at rest—deep in your bones, quiet in your thoughts, unhurried in your spirit? For most of us, that kind of stillness feels like a distant memory. We carry tension in our shoulders before our feet even hit the floor in the morning.
        - img "Vine-covered entrance" [ref=e95]
        - img "Serene bath with lush plants" [ref=e98]
        - generic [ref=e101]: We live in a world that rewards constant motion. Productivity is praised. Busyness is a badge. And somewhere along the way, rest became something we felt guilty about instead of something we were created for.
      - generic [ref=e102]:
        - paragraph [ref=e103]:
          - generic [ref=e105]: The Scripture
        - generic [ref=e108]: David, the writer of Psalm 23, was no stranger to chaos. He had been hunted by a king, betrayed by friends, and burdened by war. Yet in the middle of all that turmoil, he wrote what may be the most peaceful passage in all of Scripture. He didn’t write about rest from a place of leisure—he wrote about it from a place of lived experience with God’s faithfulness.
        - img "Outdoor shower under canopy" [ref=e111]
        - generic [ref=e114]: "Notice the language: “He makes me lie down.” God doesn’t suggest rest. He doesn’t pencil it into our calendar if we have time. He makes us lie down. Like a shepherd who knows that an exhausted sheep will wander into danger, God sometimes brings us to a full stop because He knows what we need more than we do."
        - img "Stone bed in contemplative space" [ref=e117]
        - img "Warm sauna" [ref=e120]
      - generic [ref=e121]:
        - generic [ref=e124]:
          - text: And then He leads us beside “quiet waters.” Not raging rivers. Not crashing waves. Quiet waters. The Hebrew word for “refreshes” here is the word
          - emphasis [ref=e125]: shub
          - text: —which literally means “to return” or “to restore.” God’s rest isn’t just about stopping. It’s about returning. Returning to the person you were before the anxiety took hold. Before the grief rewired your thinking. Before the burnout hollowed you out. God’s restoration brings you back to wholeness.
        - img "Tranquil pool with stacked stones" [ref=e128]
        - paragraph [ref=e129]:
          - generic [ref=e131]: The Timeless Principle
        - heading "God’s restoration begins not with doing more, but with allowing ourselves to be led into stillness." [level=3] [ref=e132]:
          - generic [ref=e134]: God’s restoration begins not with doing more, but with allowing ourselves to be led into stillness.
        - generic [ref=e137]: Peace is not the absence of problems; it is the presence of a Shepherd who knows exactly where to take us when we are depleted. Restoration of the soul starts when we stop striving and start trusting the One who never grows weary of caring for us.
        - img "Intimate sauna interior" [ref=e140]
      - generic [ref=e141]:
        - paragraph [ref=e142]:
          - generic [ref=e144]: The Application
        - generic [ref=e147]: Maybe you’re reading this in the middle of a packed schedule, on your phone between meetings, or late at night when the house is finally quiet. Wherever you are, consider this an invitation from your Shepherd. He is not asking you to earn rest—He is leading you to it.
        - generic [ref=e150]: “Lord, lead me beside still waters. Refresh my soul.”
        - generic [ref=e153]: Today, set aside just ten minutes. No phone. No agenda. No noise. Sit somewhere quiet and say it out loud. And then let Him. Don’t rush it. Don’t fill the silence with a to-do list. Just be led.
        - img "Resting couch under sunlit arch" [ref=e156]
        - img "Spa treatment" [ref=e159]
      - generic [ref=e160]:
        - img "Peaceful reading nook with ivy" [ref=e163]
        - paragraph [ref=e164]:
          - generic [ref=e166]: A Prayer for Restoration
        - generic [ref=e169]: Lord, I confess that I have been running on empty. I have searched for rest in places that cannot give it. Today, I come to You, the Shepherd of my soul. Lead me to the green pastures and the quiet waters that only You can provide. Refresh what is weary in me. Restore what has been lost. Bring me back to wholeness, peace, and strength. I trust Your leading. Amen.
        - paragraph [ref=e170]:
          - generic [ref=e172]: Psalm 23 — Restoration of Peace
      - img "Serene stone bed in golden light" [ref=e176]