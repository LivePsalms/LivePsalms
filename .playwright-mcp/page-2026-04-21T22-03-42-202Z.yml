      - img "Restoration 02" [ref=e75]
    - generic [ref=e78]:
      - generic [ref=e79]:
        - img "Hope doorway" [ref=e82]
        - heading "Hope" [level=2] [ref=e83]:
          - generic [ref=e85]: Hope
        - generic [ref=e88]: Let’s explore a future you cannot see yet, and the God who holds it.
      - generic [ref=e89]:
        - heading "Hope is a fragile thing." [level=3] [ref=e90]:
          - generic [ref=e92]: Hope is a fragile thing.
        - generic [ref=e95]: It can survive extraordinary hardship, but it can also be slowly suffocated by the weight of unanswered prayers, closed doors, and the quiet fear that maybe things will never get better. Perhaps you’re in a season where hope feels more like a word on a greeting card than something real—a concept that sounds beautiful in theory but feels impossible in your actual life.
        - img "Hope landscape" [ref=e98]
        - generic [ref=e101]: "You’ve prayed. You’ve waited. You’ve tried to be faithful. And yet the breakthrough hasn’t come. The healing hasn’t happened. The relationship hasn’t been reconciled. And in the silence, a dangerous whisper creeps in: “What if this is all there is?”"
        - img "Hope detail" [ref=e104]
      - generic [ref=e105]:
        - paragraph [ref=e106]:
          - generic [ref=e108]: The Scripture
        - generic [ref=e111]: Jeremiah 29:11 is one of the most beloved verses in Scripture, but its full power is lost if we don’t understand when God spoke it. This was not a promise delivered in a season of triumph. It was a letter—written by the prophet Jeremiah—to a people in exile. The Israelites had been ripped from their homeland and carried off to Babylon.
        - img "Scripture scene" [ref=e114]
        - img "Exile landscape" [ref=e117]
        - img "Promise fulfilled" [ref=e120]
        - generic [ref=e123]: "False prophets were telling them the exile would be brief, that God would rescue them any day now. But God’s actual message through Jeremiah was far more challenging: settle in. Build houses. Plant gardens. The exile would last seventy years. And it is into that crushing news that God speaks this promise of hope."
      - generic [ref=e124]:
        - img "God's plans" [ref=e127]
        - generic [ref=e130]: "He doesn’t deny the difficulty. He doesn’t promise a quick fix. He says, in essence: “I know this is not what you wanted to hear. But I have not abandoned you. I have plans for you—and those plans end in flourishing, not destruction.” The hope God offers is not tied to a timeline we control. It is anchored in a future He has already secured. And then comes the invitation: “You will seek me and find me when you seek me with all your heart. I will be found by you,” declares the Lord. Restoration doesn’t begin with a change in circumstances. It begins with a turning of the heart."
        - img "Hope restored" [ref=e133]
        - paragraph [ref=e134]:
          - generic [ref=e136]: The Timeless Principle
        - heading "God’s plans for us do not expire in seasons of waiting." [level=3] [ref=e137]:
          - generic [ref=e139]: God’s plans for us do not expire in seasons of waiting.
        - generic [ref=e142]: Hope is not wishful thinking—it is the confident assurance that God’s intentions toward us are good, even when our circumstances suggest otherwise. Restoration of hope does not require an escape from the hard season. It requires a redirecting of our gaze toward the One who holds the future we cannot yet see.
        - img "Future hope" [ref=e145]
      - generic [ref=e146]:
        - paragraph [ref=e147]:
          - generic [ref=e149]: The Application
        - generic [ref=e152]: "If you are in a season of waiting and your hope is wearing thin, do something countercultural today: plant something. Not because the exile is over, but because you believe God when He says it won’t last forever. This could be literal—plant a seed, tend a garden. Or it could be metaphorical—invest in a friendship, start that project you’ve been putting off, sign up for the class."
        - generic [ref=e155]: “Planting in exile is an act of defiant hope.”
        - img "Planting in exile" [ref=e158]
        - img "Defiant hope" [ref=e161]
        - generic [ref=e164]: "It declares that you trust God’s future more than your present feelings. And as you plant, seek Him. Not casually. With all your heart. Because He has promised: when you search for Him wholeheartedly, you will find Him. And finding Him is the beginning of every restoration."
        - img "Restoration moment" [ref=e167]
      - generic [ref=e168]:
        - paragraph [ref=e169]:
          - generic [ref=e171]: A Prayer for Restoration
        - generic [ref=e174]: Father, I confess that my hope has grown thin. I’ve been waiting, and the waiting has worn me down. But today I choose to believe Your word over my weariness. You said You have plans for me—plans for a hope and a future. I can’t see that future yet, but I trust the One who holds it. Restore my hope, Lord. Give me the courage to plant in exile, to build in the waiting, and to seek You with everything I have. I believe that You will be found. Bring me back, Lord. Bring me home. Amen.
        - paragraph [ref=e175]:
          - generic [ref=e177]: Jeremiah 29:11 — Restoration of Hope
        - img "Hope fulfilled" [ref=e180]
