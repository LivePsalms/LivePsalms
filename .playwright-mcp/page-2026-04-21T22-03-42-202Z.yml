        - generic [ref=e54]: The Restoration of Hope
        - heading "A Future You Cannot See Yet" [level=1] [ref=e56]
        - generic [ref=e57]:
          - generic [ref=e58]:
            - generic [ref=e60]: “For I know the plans I have for you,”
            - generic [ref=e62]: declares the Lord, “plans to prosper you
            - generic [ref=e64]: and not to harm you, plans to give you
