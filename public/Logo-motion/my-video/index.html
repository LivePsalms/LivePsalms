    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        width: 1920px;
        height: 1080px;
        overflow: hidden;
        background:
          radial-gradient(
            ellipse 90% 70% at 50% 50%,
            #0e0c10 0%,
            #08070a 60%,
            #050507 100%
          ),
          #0a0a0c;
      }

      .stage {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /*
        SOFT AMBIENT GLOW — sits behind the A and breathes with the heartbeat.
        Built from layered radial gradients so it reads as light, not a disc.
        Blend mode "screen" ensures it adds luminance to the dark canvas.
      */
      .glow-aura {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 720px;
        height: 720px;
        transform: translate(-50%, -50%);
        background:
          radial-gradient(
            circle at center,
            rgba(246, 244, 240, 0.32) 0%,
            rgba(246, 244, 240, 0.12) 22%,
            rgba(246, 244, 240, 0.04) 45%,
            rgba(246, 244, 240, 0) 72%
          );
        border-radius: 50%;
        opacity: 0;
        pointer-events: none;
        mix-blend-mode: screen;
        filter: blur(14px);
        will-change: opacity, transform;
      }

      /*
        HEARTBEAT RING — emanates from A on the "dub" beat and expands beyond
        the frame. width/height animate (not scale) so the 1px stroke stays a
        constant visual thickness as it grows. Box-shadow paints the soft halo.
      */
      .pulse-ring {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 260px;
        height: 260px;
        transform: translate(-50%, -50%);
        border-radius: 50%;
        border: 1.25px solid rgba(246, 244, 240, 0.85);
        box-shadow:
          0 0 38px rgba(246, 244, 240, 0.42),
          0 0 90px rgba(246, 244, 240, 0.18),
          inset 0 0 22px rgba(246, 244, 240, 0.12);
        opacity: 0;
        pointer-events: none;
        mix-blend-mode: screen;
        will-change: width, height, opacity;
      }

      /*
        SVG sized so the logo (PSALMS) reads substantial but airy.
        The native viewBox places the A's optical center at (593.85, 702).
        We position the SVG element so that point lands on the frame center
        (960, 540). At width=1100 / scale 0.7333:
          A center in DOM = (435.5, 514.5)
          SVG top-left   = (524.5, 25.5)
      */
      .logo-svg {
        position: absolute;
        top: 25.5px;
        left: 524.5px;
        width: 1100px;
        height: 1100px;
        overflow: visible;
        filter: drop-shadow(0 0 24px rgba(246, 244, 240, 0.04));
      }

      .letter {
        will-change: transform, opacity, filter;
      }
    </style>
  </head>

    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      /*
        TIMELINE — two movements stitched as one:

          0.0 — 1.7   Act I.1   A enters (calming fade + settle)
          1.7 — 2.1   Act I.2   A holds, alone
          2.1 — 2.6   Act I.3   Lub (first heartbeat)
          2.6 — 2.85  Act I.4   Silent gap
          2.85— 3.55  Act I.5   Dub (second heartbeat)
          3.0 — 4.8   Act I.6   Ring beams outward, past the frame
          4.2 — 6.9   Act II    PSALMS letters spread from A (waves)
          6.9 — 9.0             Final hold
      */

      const COLLAPSE = {
        P: 479.10,
        S1: 249.20,
        L: -230.26,
        M: -506.68,
        S2: -789.32,
      };

      // ─── Initial states ─────────────────────────────────────────────────────
      tl.set("#letter-A", { opacity: 0, scale: 0.92, transformOrigin: "50% 50%" }, 0);
      tl.set(".glow-aura", { opacity: 0, scale: 1, transformOrigin: "50% 50%" }, 0);
      tl.set(".pulse-ring", { width: 260, height: 260, opacity: 0 }, 0);
      tl.set("#letter-P",  { x: COLLAPSE.P,  opacity: 0, filter: "blur(6px)" }, 0);
      tl.set("#letter-S1", { x: COLLAPSE.S1, opacity: 0, filter: "blur(6px)" }, 0);
      tl.set("#letter-L",  { x: COLLAPSE.L,  opacity: 0, filter: "blur(6px)" }, 0);
      tl.set("#letter-M",  { x: COLLAPSE.M,  opacity: 0, filter: "blur(6px)" }, 0);
      tl.set("#letter-S2", { x: COLLAPSE.S2, opacity: 0, filter: "blur(6px)" }, 0);

      // ─── Act I.1 — A enters, smooth and calming ────────────────────────────
      // Slower than a UI fade (1.4s) so the breath of motion lands as "arrival,"
      // not "popup." Scale 0.92 → 1 gives the eye something to track.
      // overwrite: "auto" — heartbeat pulses chain off the same scale prop later.
      tl.to("#letter-A", {
        opacity: 1,
        scale: 1,
        duration: 1.4,
        ease: "power2.out",
        overwrite: "auto",
      }, 0.3);
      // A subtle aura builds with A — barely visible, sets the "alive" baseline.
      tl.to(".glow-aura", {
        opacity: 0.18,
        duration: 1.4,
        ease: "power1.out",
        overwrite: "auto",
      }, 0.4);

      // ─── Act I.3 — Lub (first heartbeat: small, intimate) ──────────────────
      const lub = 2.10;
      tl.to("#letter-A",  { scale: 1.022, duration: 0.18, ease: "power2.out", overwrite: "auto" }, lub);
      tl.to("#letter-A",  { scale: 1.0,   duration: 0.32, ease: "power3.out", overwrite: "auto" }, lub + 0.18);
      tl.to(".glow-aura", { opacity: 0.42, scale: 1.08, duration: 0.18, ease: "power2.out", overwrite: "auto" }, lub);
      tl.to(".glow-aura", { opacity: 0.18, scale: 1.0,  duration: 0.32, ease: "power2.out", overwrite: "auto" }, lub + 0.18);

      // ─── Act I.5 — Dub (second heartbeat: bigger, releases the ring) ──────
      const dub = 2.85;
      tl.to("#letter-A",  { scale: 1.042, duration: 0.22, ease: "power2.out", overwrite: "auto" }, dub);
      tl.to("#letter-A",  { scale: 1.0,   duration: 0.50, ease: "power3.out", overwrite: "auto" }, dub + 0.22);
      tl.to(".glow-aura", { opacity: 0.78, scale: 1.18, duration: 0.22, ease: "power2.out", overwrite: "auto" }, dub);
      tl.to(".glow-aura", { opacity: 0,    scale: 1.0,  duration: 1.30, ease: "power2.in",  overwrite: "auto" }, dub + 0.22);

      // ─── Act I.6 — Ring beams outward ──────────────────────────────────────
      // Born at the apex of the dub. Width/height animate (not scale) so the
      // 1.25px stroke stays a constant CSS thickness as the ring grows.
      // Frame diagonal ~2202px; we grow to 2800 so the ring fully exits.
      const ring = dub + 0.12; // 2.97
      tl.to(".pulse-ring", { opacity: 0.92, duration: 0.24, ease: "power2.out", overwrite: "auto" }, ring);
      tl.to(".pulse-ring", {
        width: 2800,
        height: 2800,
        duration: 1.8,
        ease: "power2.out",
        overwrite: "auto",
      }, ring);
      tl.to(".pulse-ring", {
        opacity: 0,
        duration: 1.5,
        ease: "power2.in",
        overwrite: "auto",
      }, ring + 0.35);

      // ─── Act II — PSALMS spread ────────────────────────────────────────────
      // Letters begin emerging as the ring exits the frame. The ring's afterglow
      // and the first letter wave overlap by ~0.5s — that's the seam that makes
      // both acts feel like one breath.
      //
      // Position uses power3.out (long elegant settle).
      // Opacity uses power1.out (gentle linear-ish reveal).
      // Blur uses power2.out (subtle defocus releases mid-travel).
      // A itself is NOT re-faded — it carries through both acts.
      function spread(selector, startTime) {
        tl.to(selector, { x: 0,                  duration: 1.8, ease: "power3.out" }, startTime);
        tl.to(selector, { opacity: 1,            duration: 1.4, ease: "power1.out" }, startTime);
        tl.to(selector, { filter: "blur(0px)",   duration: 1.6, ease: "power2.out" }, startTime);
      }

      const spreadAt = 4.20;
      spread("#letter-S1", spreadAt);          // inner pair — closest to A
      spread("#letter-L",  spreadAt);
      spread("#letter-P",  spreadAt + 0.45);   // outer pair
      spread("#letter-M",  spreadAt + 0.45);
      spread("#letter-S2", spreadAt + 0.90);   // far right (no left twin)

      // ─── Final hold — calm, intentional negative space ─────────────────────
      // Letters settled by ~6.9s. Hold through 9.0s. No exits, no breath.

      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
