      /* Stage centered. Sized to the wordmark; aspect 1494:290. */
      #logo-freefall .stage {
        position: absolute;
        left: 50%;

        width: 1280px;
        height: 248.46px;
        margin-left: -640px;
        margin-top: -124.23px;
        will-change: transform;
        z-index: 1;
      }

      #logo-freefall .logo {
        position: relative;

      #logo-freefall .letter {

      }

      /* All glow layers anchor on the A's exact centre.

         Vertical centre is mid-stage. */
      #logo-freefall .glow {
        position: absolute;

        border-radius: 50%;
        opacity: 0;
        transform: translate(-50%, -50%) scale(0.3);

        will-change: transform, opacity;

      /* Halo — sits BEHIND the SVG, fades in slowly during the release,

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      (function () {
        window.__timelines = window.__timelines || {};

        // 1 SVG user-space unit ↔ rendered CSS pixels at the stage width of 1280.
        const U = 1280 / 1494;

        // X-centres of each glyph in viewBox units. A (587) is the anchor.
        const A_X = 587;
        const dx = {
          P:  (A_X - 109)  * U, // letter at -3 (left of A)  → +ve x slides right
          S1: (A_X - 338)  * U, // letter at -1                → +ve x slides right
          L:  (A_X - 819)  * U, // letter at +1 (right of A) → -ve x slides left
          M:  (A_X - 1095) * U, // letter at +2                → -ve x slides left
          S2: (A_X - 1378) * U  // letter at +3 (far right)  → -ve x slides left
        };

        // Per-letter collapse: position, opacity, and blur on independent eases,
        // matching the original reveal's three-ease formula in reverse direction.
        function collapse(tl, letter, t, dur = 1.6) {
          const sel = `#logo-freefall [data-letter="${letter}"]`;
          tl.to(sel, { x: dx[letter],         duration: dur, ease: 'power3.out' }, t);
          tl.to(sel, { opacity: 0,            duration: dur, ease: 'power1.out' }, t);
          tl.to(sel, { filter: 'blur(6px)',   duration: dur, ease: 'power2.out' }, t);
        }

        const tl = gsap.timeline({ paused: true, defaults: { force3D: true } });

        // ──────────────────────────────────────────────────────────────
        // PHASES 1–3  ·  Collapse in three waves   (0.0s → ~2.6s)
        // Mirrors the original reveal's three outward waves, reversed:
        //   Wave 1 — far letter S₂ alone
        //   Wave 2 — outer pair P + M
        //   Wave 3 — inner pair S₁ + L  (last to merge into the A)
        // ──────────────────────────────────────────────────────────────
        collapse(tl, 'S2', 0.00);
        collapse(tl, 'P',  0.50);
        collapse(tl, 'M',  0.50);
        collapse(tl, 'S1', 1.00);
        collapse(tl, 'L',  1.00);

        // ──────────────────────────────────────────────────────────────
        // PHASE 4  ·  A breathes once   (~2.5s → ~3.0s)
        // A single subtle pulse marks the moment of full contact.
        // Never below scale 1; peak 1.06 — quiet, not theatrical.
        // ──────────────────────────────────────────────────────────────
        const A = '#logo-freefall [data-letter="A"]';
        tl.to(A, { scale: 1.06, duration: 0.50, ease: 'power2.out' }, 2.50)
          .to(A, { scale: 1.00, duration: 0.45, ease: 'power3.out' }, 3.00);

        // ──────────────────────────────────────────────────────────────
        // PHASE 5  ·  Glow release   (~2.95s → ~4.45s)
        // Three coordinated layers, all power2.out (the energetic release):
        //   · Core flash — quick, bright, brief
        //   · Outer ring — long, expansive, the "vibrant gesture"
        //   · Halo       — slow soft swell, lingers behind the A through the hold
        // Each layer's "bloom to peak" is method-chained with '>' so the
        // follow-up tween starts exactly where the entrance ends — no overlap.
        // ──────────────────────────────────────────────────────────────

        // Core: blink to peak, then bloom outward and fade.
        tl.fromTo('#logo-freefall .glow.core',
            { opacity: 0,    scale: 0.30 },
            { opacity: 0.95, scale: 1.00, duration: 0.14, ease: 'power1.out' },
            2.95)
          .to('#logo-freefall .glow.core',
            { opacity: 0,    scale: 26,   duration: 1.10, ease: 'power2.out' },
            '>');

        // Ring: blooms to large radius — the headline gesture.
        tl.fromTo('#logo-freefall .glow.ring',
            { opacity: 0,    scale: 0.30 },
            { opacity: 0.92, scale: 1.00, duration: 0.14, ease: 'power1.out' },
            2.95)
          .to('#logo-freefall .glow.ring',
            { opacity: 0,    scale: 60,   duration: 1.50, ease: 'power2.out' },
            '>');

        // Halo: soft swell behind the A, then a gentle ease-down to a
        // resting cream wash that holds through the final 1.5s.
        tl.fromTo('#logo-freefall .glow.halo',
            { opacity: 0,    scale: 0.30 },
            { opacity: 0.85, scale: 1.00, duration: 0.50, ease: 'power2.out' },
            2.95)
          .to('#logo-freefall .glow.halo',
            { opacity: 0.35, duration: 1.10, ease: 'power2.out' },
            '>');

        // ──────────────────────────────────────────────────────────────
        // PHASE 6  ·  Rest   (~4.5s → 6.0s)
        // Stillness. Only the A and the soft halo remain. The composition
        // lands here — quiet, contained, the original's mirror at rest.
        // ──────────────────────────────────────────────────────────────

        window.__timelines['logo-freefall'] = tl;
      })();
    </script>
